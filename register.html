<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Dashboard | SalesAnalyzer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<body class="auth-page">
    <div class="auth-card">
        <header class="auth-header" style="text-align: left; margin-bottom: 20px;">
            <a href="/" class="btn-back" style="text-decoration: none; color: var(--primary);">
                <i class="fas fa-chevron-left"></i> Back to Home
            </a>
        </header>

        <h2>Create Account</h2>
        <br>
        <form method="POST">
            <div class="form-group">
                <label>Full Name</label><br>
                <input type="text" name="name" required placeholder="John Doe" class="profile-input">
            </div><br>
            <div class="form-group">
                <label>Email Address</label><br>
                <input type="email" name="email" required placeholder="john@example.com" class="profile-input">
            </div><br>
            <div class="form-group">
                <label>Password</label><br>
                <input type="password" name="password" required minlength="6" placeholder="Min. 6 characters" class="profile-input">
            </div>
            <button type="submit" class="btn-fill full-width" style="margin-top: 20px;">Create Account</button>
        </form>
        <p class="auth-footer" style="margin-top: 20px;">Already have an account? <a href="/login">Login</a></p>
    </div>
</body>
